<nav class="sticky top-0 z-50 bg-white shadow-sm">
  <div class="flex items-center justify-between px-4 py-3 max-w-7xl mx-auto">
    <!-- Brand -->
    <a
      routerLink="/home"
      class="text-2xl font-bold tracking-tight text-gray-900"
      >Nóva</a
    >

    <!-- Hamburger button (mobile) -->
    <button
      class="md:hidden flex flex-col space-y-1.5"
      (click)="toggleMenu()"
      [class.active]="menuOpen"
    >
      <span
        class="w-6 h-0.5 bg-gray-900 transition"
        [class.rotate-45]="menuOpen"
        [class.translate-y-2]="menuOpen"
      ></span>
      <span
        class="w-6 h-0.5 bg-gray-900 transition"
        [class.opacity-0]="menuOpen"
      ></span>
      <span
        class="w-6 h-0.5 bg-gray-900 transition"
        [class.-rotate-45]="menuOpen"
        [class.-translate-y-2]="menuOpen"
      ></span>
    </button>

    <!-- Desktop nav links -->
    <div class="hidden md:flex items-center space-x-6">
      <a
        routerLink="/products"
        class="text-gray-700 hover:text-gray-900 transition"
        >Shop</a
      >
      <a
        routerLink="/cart"
        class="text-gray-700 hover:text-gray-900 transition relative"
      >
        Cart
        <span
          *ngIf="(cartCount$ | async)! > 0"
          class="absolute -top-2 -right-3 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5"
        >
          {{ cartCount$ | async }}
        </span>
      </a>
      <ng-container *ngIf="user$ | async as user; else guestLinks">
        <a
          routerLink="/orders"
          class="text-gray-700 hover:text-gray-900 transition"
          >My Orders</a
        >
        <span class="text-gray-500 text-sm">Hi, {{ user.firstName }}</span>
        <button
          (click)="openLogoutModal()"
          class="text-gray-700 hover:text-gray-900 transition"
        >
          Logout
        </button>
      </ng-container>
      <ng-template #guestLinks>
        <a
          routerLink="/login"
          class="text-gray-700 hover:text-gray-900 transition"
          >Login</a
        >
        <a
          routerLink="/register"
          class="bg-gray-900 text-white px-4 py-1.5 rounded-full hover:bg-gray-800 transition"
          >Register</a
        >
      </ng-template>
    </div>
  </div>

  <!-- Mobile menu (slide overlay) -->
  <div *ngIf="menuOpen" class="md:hidden fixed inset-0 z-40">
    <div class="absolute inset-0 bg-black/50" (click)="closeMenu()"></div>
    <div
      class="absolute right-0 top-0 h-full w-64 bg-white shadow-lg p-6 flex flex-col space-y-4"
    >
      <a
        routerLink="/products"
        (click)="closeMenu()"
        class="text-gray-800 hover:text-black"
        >Shop</a
      >
      <a
        routerLink="/cart"
        (click)="closeMenu()"
        class="text-gray-800 hover:text-black relative"
      >
        Cart
        <span
          *ngIf="(cartCount$ | async)! > 0"
          class="ml-1 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5"
        >
          {{ cartCount$ | async }}
        </span>
      </a>
      <ng-container *ngIf="user$ | async as user; else mobileGuest">
        <a
          routerLink="/orders"
          (click)="closeMenu()"
          class="text-gray-800 hover:text-black"
          >My Orders</a
        >
        <span class="text-gray-500">Hi, {{ user.firstName }}</span>
        <button (click)="openLogoutModal()" class="text-gray-800 hover:text-black">
          Logout
        </button>
      </ng-container>
      <ng-template #mobileGuest>
        <a
          routerLink="/login"
          (click)="closeMenu()"
          class="text-gray-800 hover:text-black"
          >Login</a
        >
        <a
          routerLink="/register"
          (click)="closeMenu()"
          class="bg-gray-900 text-white px-6 py-2 rounded-full"
          >Register</a
        >
      </ng-template>
    </div>
  </div>
</nav>

<app-confirm-modal
  [isOpen]="showLogoutModal"
  title="Log out?"
  message="Are you sure you want to sign out of your account?"
  confirmText="Logout"
  cancelText="Cancel"
  confirmButtonClass="bg-red-600 hover:bg-red-700"
  (confirm)="confirmLogout()"
  (cancel)="cancelLogout()"
>
  <div icon>🚪</div>
</app-confirm-modal>
