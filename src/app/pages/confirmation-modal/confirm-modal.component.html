<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/50" (click)="onCancel()"></div>
  
  <!-- Modal panel -->
  <div class="relative bg-white rounded-xl shadow-xl max-w-sm w-full mx-4 p-6 text-center">
    <div class="text-4xl mb-4">
      <ng-content select="[icon]"></ng-content>
    </div>
    <h3 class="text-lg font-semibold text-gray-900">{{ title }}</h3>
    <p class="text-gray-500 mt-1">{{ message }}</p>
    <div class="flex gap-3 mt-6">
      <button (click)="onCancel()"
              class="flex-1 px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition">
        {{ cancelText }}
      </button>
      <button (click)="onConfirm()"
              class="flex-1 px-4 py-2 text-white rounded-md transition"
              [class]="confirmButtonClass">
        {{ confirmText }}
      </button>
    </div>
  </div>
</div>
