<div class="max-w-7xl mx-auto px-4 py-8">
  <h1 class="text-2xl font-bold mb-6">Checkout</h1>

  <!-- Success screen -->
  <div *ngIf="success" class="text-center py-16 bg-green-50 rounded-lg">
    <div class="w-16 h-16 bg-green-500 text-white text-3xl rounded-full flex items-center justify-center mx-auto mb-4">✓</div>
    <h2 class="text-xl font-semibold mb-2">Order Placed!</h2>
    <p class="text-gray-600">Thank you for your purchase. Redirecting to your orders...</p>
  </div>

  <!-- Checkout grid (form + summary) -->
  <div *ngIf="!success" class="flex flex-col lg:flex-row gap-8">
    <!-- Address Form -->
    <div class="flex-1">
      <form [formGroup]="form" (ngSubmit)="placeOrder()" class="space-y-6">
        <div class="bg-white p-6 rounded-lg shadow-sm border">
          <h2 class="text-lg font-semibold mb-4">Delivery Address</h2>

          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Full name</label>
              <input type="text" formControlName="fullName" placeholder="John Doe"
                     class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-gray-500 focus:border-gray-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Address line 1</label>
              <input type="text" formControlName="line1" placeholder="House No., Street"
                     class="w-full border border-gray-300 rounded-md px-3 py-2">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">
                Address line 2 <span class="text-gray-400 text-xs">(optional)</span>
              </label>
              <input type="text" formControlName="line2" placeholder="Landmark, Area"
                     class="w-full border border-gray-300 rounded-md px-3 py-2">
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
                <input type="text" formControlName="city" placeholder="Chennai"
                       class="w-full border border-gray-300 rounded-md px-3 py-2">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">State</label>
                <input type="text" formControlName="state" placeholder="Tamil Nadu"
                       class="w-full border border-gray-300 rounded-md px-3 py-2">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">PIN code</label>
                <input type="text" formControlName="postalCode" placeholder="600001"
                       class="w-full border border-gray-300 rounded-md px-3 py-2">
              </div>
            </div>
          </div>
        </div>

        <!-- Payment Method -->
        <div class="bg-white p-6 rounded-lg shadow-sm border">
          <h2 class="text-lg font-semibold mb-4">Payment Method</h2>
          <div class="space-y-3">
            <label class="flex items-center gap-3 p-3 border rounded-md cursor-pointer hover:bg-gray-50 transition"
                   [class.border-gray-900]="form.get('paymentMethod')?.value === 'COD'">
              <input type="radio" formControlName="paymentMethod" value="COD" class="w-4 h-4">
              <span>Cash on Delivery</span>
            </label>
            <label class="flex items-center gap-3 p-3 border rounded-md cursor-pointer hover:bg-gray-50 transition"
                   [class.border-gray-900]="form.get('paymentMethod')?.value === 'UPI'">
              <input type="radio" formControlName="paymentMethod" value="UPI" class="w-4 h-4">
              <span>UPI</span>
            </label>
            <label class="flex items-center gap-3 p-3 border rounded-md cursor-pointer hover:bg-gray-50 transition"
                   [class.border-gray-900]="form.get('paymentMethod')?.value === 'Card'">
              <input type="radio" formControlName="paymentMethod" value="Card" class="w-4 h-4">
              <span>Credit / Debit Card</span>
            </label>
          </div>
        </div>

        <div *ngIf="error" class="text-red-600 text-sm bg-red-50 p-2 rounded">
          {{ error }}
        </div>

        <button type="submit" [disabled]="form.invalid || loading"
                class="w-full bg-gray-900 text-white py-3 rounded-md font-semibold hover:bg-gray-800 transition disabled:opacity-50">
          <span *ngIf="!loading">Place Order · ₹{{ subtotal }}</span>
          <span *ngIf="loading">Placing order...</span>
        </button>
      </form>
    </div>

    <!-- Order Summary Panel -->
    <div class="lg:w-80 bg-gray-50 p-6 rounded-lg h-fit sticky top-24">
      <h2 class="text-lg font-bold mb-4">Order Summary</h2>
      <div class="space-y-3">
        <div *ngFor="let item of cartItems" class="flex justify-between text-sm">
          <span>{{ item.productName }}
            <small *ngIf="item.size"> ({{ item.size }})</small>
            <small *ngIf="item.color"> {{ item.color }}</small>
            × {{ item.quantity }}
          </span>
          <span>₹{{ item.price * item.quantity }}</span>
        </div>
        <div class="border-t pt-3"></div>
        <div class="flex justify-between font-bold">
          <span>Total</span>
          <span>₹{{ subtotal }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
