<div class="flex flex-col md:flex-row max-w-7xl mx-auto px-4 py-8 gap-8">
  <!-- Sidebar Filters -->
  <aside class="md:w-64 space-y-6">
    <div class="flex justify-between items-center">
      <h3 class="font-semibold text-lg">Filters</h3>
      <button
        (click)="clearFilters()"
        class="text-sm text-gray-500 hover:text-gray-900"
      >
        Clear all
      </button>
    </div>

    <!-- Category Filter -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Category</label
      >
      <select
        [(ngModel)]="filters.categoryId"
        (change)="onFilterChange()"
        class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-gray-500 focus:border-gray-500"
      >
        <option [ngValue]="null">All Categories</option>
        <option *ngFor="let c of categories" [value]="c.id">
          {{ c.name }}
        </option>
      </select>
    </div>

<!-- Price Range (Slider + Number Inputs) -->
<div>
  <label class="block text-sm font-medium text-gray-700 mb-3">Price Range</label>
  
  <!-- Number inputs (keep as is) -->
  <div class="flex items-center gap-3 mb-4">
    <div class="relative flex-1">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">₹</span>
      <input type="number" 
             [(ngModel)]="filters.minPrice"
             (change)="onPriceInput()"
             min="0"
             [max]="maxPrice"
             class="w-full pl-7 pr-2 py-2 border border-gray-300 rounded-md focus:ring-1 focus:ring-gray-900">
    </div>
    <span class="text-gray-400">—</span>
    <div class="relative flex-1">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">₹</span>
      <input type="number" 
             [(ngModel)]="filters.maxPrice"
             (change)="onPriceInput()"
             min="0"
             [max]="maxPrice"
             class="w-full pl-7 pr-2 py-2 border border-gray-300 rounded-md focus:ring-1 focus:ring-gray-900">
    </div>
  </div>

  <!-- Slider container with overflow visible -->
  <div class="relative h-2 bg-gray-200 rounded-full overflow-visible">
    <!-- Filled range – now non‑blocking -->
    <div class="absolute h-full bg-gray-900 rounded-full" 
         [style.left.%]="minPercent" 
         [style.right.%]="maxPercent"
         style="pointer-events: none;">
    </div>
    <!-- Left thumb -->
    <input type="range" 
           [min]="0" 
           [max]="maxPrice" 
           step="100"
           [(ngModel)]="filters.minPrice"
           (input)="onSliderInput()"
           (change)="onFilterChange()"
           class="absolute w-full h-2 appearance-none bg-transparent"
           style="pointer-events: auto; z-index: 20; -webkit-appearance: none;">
    <!-- Right thumb -->
    <input type="range" 
           [min]="0" 
           [max]="maxPrice" 
           step="100"
           [(ngModel)]="filters.maxPrice"
           (input)="onSliderInput()"
           (change)="onFilterChange()"
           class="absolute w-full h-2 appearance-none bg-transparent"
           style="pointer-events: auto; z-index: 20; -webkit-appearance: none;">
  </div>
</div>
    <!-- Featured Only -->
    <!-- <div>
      <label class="flex items-center gap-2 text-sm">
        <input
          type="checkbox"
          [(ngModel)]="filters.featured"
          (change)="onFilterChange()"
          class="rounded"
        />
        Featured only
      </label>
    </div> -->
  </aside>

  <!-- Main Content -->
  <main class="flex-1">
    <!-- Search Bar -->
    <div class="mb-4">
      <div class="flex gap-2">
        <input
          type="text"
          placeholder="Search products, brands..."
          [(ngModel)]="searchTerm"
          (keyup.enter)="onSearch()"
          class="flex-1 border border-gray-300 rounded-md px-4 py-2"
        />
        <button
          (click)="onSearch()"
          class="px-6 py-2 bg-gray-900 text-white rounded-md hover:bg-gray-800 transition"
        >
          Search
        </button>
      </div>
    </div>
    <div class="flex justify-end items-center mb-4">
      <p class="text-sm text-gray-500" *ngIf="!loading">
        {{ total }} products found
      </p>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="flex justify-center py-12">
      <div
        class="w-8 h-8 border-4 border-gray-200 border-t-gray-900 rounded-full animate-spin"
      ></div>
    </div>

    <!-- Product Grid -->
    <div
      *ngIf="!loading && products.length > 0"
      class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"
    >
      <div
        *ngFor="let p of products"
        [routerLink]="['/products', p.id]"
        class="bg-white rounded-xl shadow-sm hover:shadow-md transition cursor-pointer overflow-hidden group"
      >
        <div class="relative aspect-[3/4] overflow-hidden bg-gray-100">
          <img
            [src]="p.primaryImage | imageUrl"
            [alt]="p.name"
            alt=""
            class="w-full h-full object-cover group-hover:scale-105 transition duration-300"
          />
          <span
            *ngIf="p.salePrice"
            class="absolute top-2 left-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded"
          >
            SALE
          </span>
        </div>
        <div class="p-3">
          <p class="text-xs text-gray-500 uppercase tracking-wide">
            {{ p.brand }}
          </p>
          <h3 class="font-semibold text-gray-800 truncate">{{ p.name }}</h3>
          <div class="flex items-center gap-2 mt-1">
            <span *ngIf="p.salePrice" class="text-red-600 font-bold"
              >₹{{ p.salePrice }}</span
            >
            <span
              class="text-gray-700"
              [class.line-through]="p.salePrice"
              [class.text-gray-400]="p.salePrice"
            >
              ₹{{ p.price }}
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && products.length === 0" class="text-center py-12">
      <p class="text-gray-500">
        No products found. Try adjusting your filters.
      </p>
      <button
        (click)="clearFilters()"
        class="mt-2 text-sm text-gray-700 underline"
      >
        Clear Filters
      </button>
    </div>

    <!-- Pagination -->
    <div
      *ngIf="total > filters.pageSize"
      class="flex justify-center items-center gap-4 mt-8"
    >
      <button
        (click)="prevPage()"
        [disabled]="filters.page === 1"
        class="px-4 py-2 border rounded-md disabled:opacity-50 hover:bg-gray-50"
      >
        ← Prev
      </button>
      <span>Page {{ filters.page }} of {{ totalPages }}</span>
      <button
        (click)="nextPage()"
        [disabled]="filters.page >= totalPages"
        class="px-4 py-2 border rounded-md disabled:opacity-50 hover:bg-gray-50"
      >
        Next →
      </button>
    </div>
  </main>
</div>
